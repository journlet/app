<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <!--
      Content Security Policy. The entire E2E model rests on the integrity of
      the JS running here, so lock script-src to self: no inline scripts, no
      remote script origins, so an injected string can never execute and read
      the keyring out of IndexedDB. style-src keeps 'unsafe-inline' only
      because React writes element styles inline; script-src stays strict.
      connect-src is limited to the Supabase project (REST + realtime wss).
      Delivered via meta because GitHub Pages cannot set response headers;
      frame-ancestors is header-only, so clickjacking cover needs a header
      (nginx path) or is accepted for the Pages deploy.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://hpbdtcoskwmcggiyqtde.supabase.co wss://hpbdtcoskwmcggiyqtde.supabase.co; manifest-src 'self'; worker-src 'self'; base-uri 'none'; object-src 'none'; form-action 'self'"
    />
    <meta name="referrer" content="no-referrer" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#F5F4EF" />
    <meta
      name="description"
      content="Journlet — a bullet journal that feels like a journal."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Public+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Journlet</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
